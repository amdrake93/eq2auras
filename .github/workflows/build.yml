name: build
on:
  push:            # all branches — every push gets tests + the WPF compile verified
  workflow_dispatch:

permissions:
  contents: write   # needed to create/update the rolling prerelease

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: ver
        shell: bash
        run: echo "version=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - uses: microsoft/setup-msbuild@v3

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve ACT latest release tag
        id: act
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: echo "tag=$(gh release view --repo EQAditu/AdvancedCombatTracker --json tagName -q .tagName)" >> "$GITHUB_OUTPUT"

      - name: Cache ACT zip (keyed on the resolved tag)
        id: actcache
        uses: actions/cache@v4
        with:
          path: act.zip
          key: act-${{ steps.act.outputs.tag }}

      - name: Download ACT if not cached
        if: steps.actcache.outputs.cache-hit != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download "${{ steps.act.outputs.tag }}" --repo EQAditu/AdvancedCombatTracker --pattern ACTv3.zip --output act.zip --clobber

      - name: Extract ACT exe to the reference HintPath
        shell: pwsh
        run: |
          Write-Host "Building against ACT ${{ steps.act.outputs.tag }}"
          New-Item -ItemType Directory -Force -Path ThirdParty | Out-Null
          Expand-Archive -Path act.zip -DestinationPath act-extracted -Force
          Copy-Item "act-extracted/Advanced Combat Tracker.exe" "ThirdParty/Advanced Combat Tracker.exe" -Force
          if (-not (Test-Path "ThirdParty/Advanced Combat Tracker.exe")) { throw "ACT exe not found in ACTv3.zip" }

      - name: Run Core unit tests
        run: dotnet test tests/eq2auras.Core.Tests/eq2auras.Core.Tests.csproj -c Release

      - name: Build the plugin (MSBuild — required for WPF; plugin only — tests already ran via dotnet)
        run: msbuild src/eq2auras.Plugin/eq2auras.Plugin.csproj -restore -p:Configuration=Release -p:Version=${{ steps.ver.outputs.version }}

      - name: Stage plugin artifacts
        shell: bash
        run: |
          mkdir dist
          cp "src/eq2auras.Plugin/bin/Release/net472/eq2auras.dll" dist/

      - uses: actions/upload-artifact@v4
        with:
          name: eq2auras-${{ steps.ver.outputs.version }}
          path: dist/*

      - name: Publish rolling prerelease
        if: github.ref == 'refs/heads/main'   # releasing is a main-only event; branches only verify
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: ${{ steps.ver.outputs.version }}
          prerelease: true
          files: dist/*
